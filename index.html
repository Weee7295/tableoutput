<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table Processing Assessment</title>
    <script src="https://unpkg.com/xlsx/dist/xlsx.full.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        table { border-collapse: collapse; margin-top: 20px; margin-bottom: 40px; }
        th, td { border: 1px solid #ddd; padding: 8px 12px; text-align: center; }
        th { background-color: #f4f4f4; }
        .container { max-width: 600px; }
    </style>
</head>
<body>

    <div class="container">
        <h2>Upload Table Data</h2>
        <input type="file" id="excel-upload" accept=".xlsx, .xls, .csv" />

        <h3>Table 1</h3>
        <table id="table1">
            </table>

        <h3>Table 2</h3>
        <table id="table2">
            <thead>
                <tr>
                    <th>Category</th>
                    <th>Value</th>
                </tr>
            </thead>
            <tbody id="table2-body">
                </tbody>
        </table>
    </div>

    <script>
        document.getElementById('excel-upload').addEventListener('change', function(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();

            reader.onload = function(e) {
                const rawText = e.target.result;
                    
                const tableData = rawText
                    .split('\n')
                    .map(row => row.trim())
                    .map(row => row.split(','));

                const table1 = document.getElementById('table1');
                
                tableData.forEach((row, rowIndex) => {
                    const tr = document.createElement('tr');
                    row.forEach(cell => {
                        const cellElement = document.createElement(rowIndex === 0 ? 'th' : 'td');
                        cellElement.textContent = cell !== undefined ? cell : ''; 
                        tr.appendChild(cellElement);
                    });
                    table1.appendChild(tr);
                });

                function getValueById(idToFind) {
                        for (let i = 0; i < tableData.length; i++) {
                            // Index #
                            if (tableData[i][0] === idToFind) {
                                // Value
                                return Number(tableData[i][1]);
                            }
                        }
                        return 0; 
                }

                const valA5 = getValueById("A5");
                const valA20 = getValueById("A20");
                
                const valA15 = getValueById("A15");
                const valA7 = getValueById("A7"); 
                
                const valA13 = getValueById("A13");
                const valA12 = getValueById("A12");

                const alphaValue = Math.trunc(valA5 + valA20);
                const betaValue = Math.trunc(valA15 / valA7);
                const charlieValue = Math.trunc(valA13 * valA12);

                const table2Body = document.getElementById('table2-body');
                table2Body.innerHTML = `
                    <tr>
                        <td>Alpha</td>
                        <td>${alphaValue}</td>
                    </tr>
                    <tr>
                        <td>Beta</td>
                        <td>${betaValue}</td>
                    </tr>
                    <tr>
                        <td>Charlie</td>
                        <td>${charlieValue}</td>
                    </tr>
                `;
            };

            reader.readAsText(file);
        });
    </script>
</body>
</html>
